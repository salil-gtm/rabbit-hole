<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rabbit Hole — Settings</title>
  <style>
    :root {
      --bg: #0f0b1e;
      --card: #1a1533;
      --border: #2f2757;
      --text: #f2efff;
      --text-dim: #b5aad9;
      --accent: #7b61ff;
      --accent-2: #ff6fb5;
      --success: #3ddc97;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1000px 500px at 0% 0%, rgba(123,97,255,0.2), transparent 60%), var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    h1 {
      margin: 0 0 6px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 24px;
    }
    .subtitle {
      color: var(--text-dim);
      font-size: 14px;
      margin: 0 0 24px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 160ms;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(123,97,255,0.3);
    }
    .row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      color: white;
      padding: 11px 20px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      transition: transform 160ms;
    }
    button:hover { transform: translateY(-1px); }
    button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .hint {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 10px;
      line-height: 1.55;
    }
    .hint a { color: var(--accent); }
    .status {
      margin-top: 16px;
      font-size: 13px;
      font-weight: 500;
      min-height: 20px;
    }
    .status.ok { color: var(--success); }
    .status.err { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="card">
    <h1><span>🐇</span> Rabbit Hole Settings</h1>
    <p class="subtitle">Paste your Google Gemini API key to unlock the extension. Keys live in Chrome sync storage on your device.</p>

    <label for="api-key">Gemini API Key</label>
    <input id="api-key" type="password" placeholder="AIzaSy…" autocomplete="off" />

    <div class="row">
      <button id="save">Save</button>
      <button id="toggle-reveal" class="secondary">Show</button>
    </div>

    <div id="status" class="status"></div>

    <p class="hint">
      Don't have one? Grab a free key from
      <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a>.
      Rabbit Hole uses <code>gemini-2.0-flash</code> for fast, low-cost exploration.
    </p>
  </div>

  <script src="options.js"></script>
</body>
</html>
